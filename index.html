<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>猛獣バトルシミュレーター</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0c08;
      --panel: #1e1a10;
      --panel2: #2a2418;
      --border: #5a4a20;
      --gold: #d4a520;
      --gold2: #f0c040;
      --red: #c0392b;
      --green: #27ae60;
      --blue: #2980b9;
      --purple: #8e44ad;
      --text: #e8d5a0;
      --text-dim: #9a8060;
      --rage-color: #e67e22;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      text-align: center;
      font-size: 1.6rem;
      color: var(--gold2);
      text-shadow: 0 0 20px rgba(212,165,32,0.5);
      margin-bottom: 6px;
      letter-spacing: 0.1em;
    }
    .subtitle {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.8rem;
      margin-bottom: 24px;
    }

    /* 設定 */
    .settings {
      max-width: 500px;
      margin: 0 auto 20px;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: var(--text-dim);
    }
    .settings label { white-space: nowrap; }
    .top-controls {
      max-width: 860px;
      margin: 0 auto 12px;
      display: flex;
      justify-content: flex-end;
    }
    .language-switch {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-dim);
      font-size: 0.78rem;
    }
    .language-switch select {
      background: var(--panel2);
      border: 1px solid var(--border);
      color: var(--gold);
      padding: 5px 8px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.78rem;
      cursor: pointer;
    }
    .settings input[type=number] {
      width: 60px;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--gold);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.9rem;
      text-align: center;
    }

    /* キャラ選択 */
    .char-select-area {
      display: flex;
      gap: 16px;
      max-width: 800px;
      margin: 0 auto 20px;
      align-items: center;
    }
    .vs-label {
      color: var(--gold);
      font-size: 1.4rem;
      font-weight: 700;
      text-shadow: 0 0 10px rgba(212,165,32,0.8);
      white-space: nowrap;
    }
    .char-selector {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .char-selector select {
      width: 100%;
      background: var(--panel2);
      border: 1px solid var(--border);
      color: var(--gold);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .char-preview {
      font-size: 0.82rem;
      color: var(--text-dim);
      line-height: 1.8;
    }
    .char-preview .name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--gold2);
      margin-bottom: 6px;
    }
    .stat-row { display: flex; justify-content: space-between; }
    .stat-val { color: var(--text); font-weight: 500; }
    .skill-tag {
      display: inline-block;
      background: rgba(212,165,32,0.15);
      border: 1px solid rgba(212,165,32,0.3);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.72rem;
      color: var(--gold);
      margin: 2px 2px 0 0;
    }
    .skill-tag.passive { background: rgba(39,174,96,0.15); border-color: rgba(39,174,96,0.3); color: #2ecc71; }
    .skill-tag.battlecry { background: rgba(231,76,60,0.15); border-color: rgba(231,76,60,0.3); color: #e74c3c; }

    /* ボタン */
    .btn-area {
      text-align: center;
      margin-bottom: 24px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 12px 32px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }
    .btn-primary {
      background: linear-gradient(135deg, #b8860b, #d4a520, #f0c040);
      color: #0e0c08;
      box-shadow: 0 4px 15px rgba(212,165,32,0.4);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212,165,32,0.6); }
    .btn-secondary {
      background: var(--panel2);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { color: var(--text); border-color: var(--gold); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* バトルエリア */
    .battle-area {
      max-width: 800px;
      margin: 0 auto;
    }

    /* HP/レイジバー */
    .fighters {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .fighter-card {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
    }
    .fighter-card.winner { border-color: var(--gold); box-shadow: 0 0 20px rgba(212,165,32,0.3); }
    .fighter-card.loser { opacity: 0.5; }
    .fighter-name {
      font-weight: 700;
      color: var(--gold2);
      margin-bottom: 4px;
      font-size: 0.95rem;
    }
    .fighter-lv { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 10px; }
    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 3px;
    }
    .bar-wrap {
      background: rgba(0,0,0,0.4);
      border-radius: 4px;
      height: 12px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .bar-inner {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    .hp-bar { background: linear-gradient(90deg, #27ae60, #2ecc71); }
    .hp-bar.low { background: linear-gradient(90deg, #c0392b, #e74c3c); }
    .hp-bar.mid { background: linear-gradient(90deg, #e67e22, #f39c12); }
    .rage-bar { background: linear-gradient(90deg, #d35400, var(--rage-color)); }

    /* バトルログ */
    .log-area {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      max-height: 400px;
      overflow-y: auto;
      font-size: 0.82rem;
      line-height: 1.7;
    }
    .log-area::-webkit-scrollbar { width: 6px; }
    .log-area::-webkit-scrollbar-track { background: var(--panel2); }
    .log-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .log-turn { color: var(--gold); font-weight: 700; margin-top: 10px; border-top: 1px solid rgba(90,74,32,0.4); padding-top: 8px; }
    .log-turn:first-child { margin-top: 0; border-top: none; padding-top: 0; }
    .log-attack { color: var(--text); }
    .log-skill { color: #f39c12; }
    .log-dodge { color: #3498db; }
    .log-passive { color: #2ecc71; }
    .log-crit { color: #e74c3c; font-weight: 700; }
    .log-double { color: #9b59b6; }
    .log-winner { color: var(--gold2); font-size: 1.1rem; font-weight: 700; text-align: center; padding: 12px; }
    .log-start { color: var(--text-dim); }
    .log-debuff { color: #e74c3c; }
    .log-buff { color: #2ecc71; }
    .placeholder {
      color: var(--text-dim);
      text-align: center;
      padding: 40px;
      font-size: 0.9rem;
    }

    /* スキル編集 */
    .skill-edit-btn {
      width: 100%; margin-top: 8px;
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--text-dim);
      padding: 5px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      font-family: inherit;
      transition: all 0.2s;
    }
    .skill-edit-btn:hover { border-color: var(--gold); color: var(--gold); }
    .skill-editor {
      margin-top: 8px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      font-size: 0.75rem;
    }
    .skill-edit-row { margin-bottom: 10px; }
    .skill-edit-row:last-child { margin-bottom: 0; }
    .skill-edit-name { color: var(--gold); font-weight: 500; margin-bottom: 5px; }
    .skill-edit-fields { display: flex; flex-wrap: wrap; gap: 8px; }
    .skill-edit-field { display: flex; align-items: center; gap: 4px; color: var(--text-dim); }
    .skill-edit-field input {
      width: 58px;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--gold);
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 0.8rem;
      text-align: center;
    }
    .skill-edit-field input:focus { outline: none; border-color: var(--gold); }

    /* モンテカルロ結果 */
    .monte-result {
      margin-top: 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      display: none;
    }
    .monte-result h3 { color: var(--gold); margin-bottom: 12px; font-size: 0.95rem; }
    .monte-bar-wrap { background: rgba(0,0,0,0.4); border-radius: 6px; height: 28px; overflow: hidden; display: flex; margin-bottom: 8px; }
    .monte-bar-a { background: linear-gradient(90deg, #2980b9, #3498db); display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; font-size: 0.8rem; font-weight: 700; color: white; transition: width 0.6s ease; }
    .monte-bar-b { background: linear-gradient(90deg, #c0392b, #e74c3c); display: flex; align-items: center; padding-left: 8px; font-size: 0.8rem; font-weight: 700; color: white; transition: width 0.6s ease; }
    .monte-names { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-dim); }
    .monte-stats { margin-top: 8px; font-size: 0.78rem; color: var(--text-dim); display: flex; gap: 16px; flex-wrap: wrap; }
    .monte-stats span { color: var(--text); }

    /* 設定サマリー */
    .config-summary {
      max-width: 820px;
      margin: 0 auto 16px;
      display: none;
      gap: 12px;
    }
    .config-team-block {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .config-team-title {
      font-weight: 700;
      color: var(--gold);
      font-size: 0.85rem;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }
    .config-char-row {
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(90,74,32,0.3);
    }
    .config-char-row:last-child { border-bottom: none; margin-bottom: 0; }
    .config-char-name { font-weight: 700; color: var(--gold2); font-size: 0.83rem; margin-bottom: 3px; }
    .config-char-stats { font-size: 0.72rem; color: var(--text-dim); margin-bottom: 4px; }
    .config-char-stats span { color: var(--text); }
    .config-skill-row { font-size: 0.70rem; color: var(--text-dim); line-height: 1.6; }
    .config-skill-row b { color: #e8a030; }
    .config-empty { color: var(--text-dim); font-size: 0.78rem; }

    /* 6v6 チームビルダー */
    .teams-area {
      display: flex;
      gap: 12px;
      max-width: 860px;
      margin: 0 auto 20px;
      align-items: flex-start;
    }
    .team-panel {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }
    .team-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--gold2);
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }
    .team-slot-wrap { margin-bottom: 4px; }
    .team-slot {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--panel2);
      border-radius: 5px;
      padding: 5px 7px;
    }
    .slot-num {
      color: var(--text-dim);
      font-size: 0.7rem;
      width: 14px;
      text-align: center;
      flex-shrink: 0;
    }
    .slot-select {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--gold);
      padding: 3px 5px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-family: inherit;
      cursor: pointer;
      min-width: 0;
    }
    .slot-agi {
      font-size: 0.68rem;
      color: var(--text-dim);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .slot-edit-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 1px 3px;
      flex-shrink: 0;
    }
    .slot-edit-btn:hover { color: var(--gold); }
    .slot-editor {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-top: 3px;
      padding: 8px;
      font-size: 0.73rem;
    }
    .slot-editor .skill-edit-row { margin-bottom: 7px; }
    .slot-editor .skill-edit-row:last-child { margin-bottom: 0; }
    .slot-editor .skill-edit-name { color: var(--gold); margin-bottom: 4px; }
    .slot-editor .skill-edit-fields { display: flex; flex-wrap: wrap; gap: 6px; }
    .slot-editor .skill-edit-field { display: flex; align-items: center; gap: 3px; color: var(--text-dim); }
    .slot-editor .skill-edit-field input {
      width: 52px;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--gold);
      padding: 2px 5px;
      border-radius: 3px;
      font-size: 0.75rem;
      text-align: center;
    }
    /* プレイヤープリセット */
    .player-presets {
      max-width: 860px;
      margin: 0 auto 22px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }
    .preset-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .preset-title {
      color: var(--gold2);
      font-weight: 700;
      font-size: 0.95rem;
    }
    .preset-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }
    .preset-actions input,
    .preset-actions select {
      background: var(--panel2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 9px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.78rem;
      min-height: 34px;
    }
    .preset-actions input { width: 180px; }
    .preset-actions select { color: var(--gold); }
    .preset-mini-btn {
      background: var(--panel2);
      border: 1px solid var(--border);
      color: var(--gold);
      border-radius: 6px;
      padding: 7px 10px;
      min-height: 34px;
      font-family: inherit;
      font-size: 0.76rem;
      font-weight: 700;
      cursor: pointer;
    }
    .preset-mini-btn:hover { border-color: var(--gold); color: var(--gold2); }
    .preset-mini-btn.danger { color: #e07a6f; }
    .preset-list {
      display: grid;
      gap: 7px;
    }
    .preset-empty {
      color: var(--text-dim);
      font-size: 0.78rem;
      padding: 8px 2px 2px;
    }
    .preset-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(90,74,32,0.65);
      border-radius: 6px;
      padding: 9px 10px;
    }
    .preset-name {
      color: var(--text);
      font-weight: 700;
      font-size: 0.85rem;
    }
    .preset-meta {
      color: var(--text-dim);
      font-size: 0.72rem;
      margin-top: 3px;
      line-height: 1.5;
    }
    .preset-row-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .preset-status {
      min-height: 16px;
      color: var(--gold);
      font-size: 0.73rem;
      margin-top: 8px;
    }
    .preset-export-box {
      display: none;
      width: 100%;
      min-height: 120px;
      margin-top: 8px;
      background: rgba(0,0,0,0.28);
      border: 1px solid rgba(90,74,32,0.8);
      color: var(--text);
      border-radius: 6px;
      padding: 9px 10px;
      font-family: Consolas, 'Courier New', monospace;
      font-size: 0.72rem;
      line-height: 1.45;
      resize: vertical;
    }
    @media (max-width: 600px) {
      .preset-head { align-items: stretch; flex-direction: column; }
      .preset-actions { justify-content: stretch; }
      .preset-actions input,
      .preset-actions select,
      .preset-actions button { flex: 1 1 100%; width: 100%; }
      .preset-row { grid-template-columns: 1fr; }
      .preset-row-actions { justify-content: stretch; }
      .preset-row-actions button { flex: 1; }
    }
    /* ロスター（生存状況） */
    .team-rosters {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 860px;
      margin: 0 auto 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
    }
    .roster-side { display: flex; gap: 5px; align-items: center; }
    .roster-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.58rem;
      text-align: center;
      line-height: 1.2;
      padding: 2px;
      transition: all 0.3s;
      color: var(--text-dim);
    }
    .roster-icon.alive { border-color: var(--green); color: var(--text); background: rgba(39,174,96,0.12); }
    .roster-icon.current { border-color: var(--gold); color: var(--gold2); background: rgba(212,165,32,0.18); box-shadow: 0 0 8px rgba(212,165,32,0.4); }
    .roster-icon.dead { opacity: 0.25; }
    .roster-vs { color: var(--gold); font-weight: 700; font-size: 1rem; }

    @media (max-width: 600px) {
      .teams-area { flex-direction: column; }
      .fighters { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="top-controls">
  <label class="language-switch">
    <span data-i18n="language">言語</span>
    <select id="languageSelect" onchange="setLanguage(this.value)">
      <option value="ja">日本語</option>
      <option value="en">English</option>
      <option value="ru">Русский</option>
      <option value="zh">中文</option>
    </select>
  </label>
</div>

<h1>⚔️ <span data-i18n="appTitle">猛獣バトルシミュレーター</span> <span style="font-size:1rem;color:var(--gold)">6v6</span></h1>
<p class="subtitle" data-i18n="subtitle">サベージサバイバル 恐竜の咆哮 | 戦闘予測ツール</p>

<div class="settings">
  <span style="color:var(--text-dim);font-size:0.85rem" data-i18n="rageFormula">レイジ獲得量: 戦意 × 0.2778（キャラごとに自動計算）</span>
</div>

<div class="teams-area">
  <div class="team-panel">
    <div class="team-title" data-i18n="teamAOwn">チームA（自分）</div>
    <div id="slotsA"></div>
  </div>
  <div class="vs-label" style="padding-top:40px">VS</div>
  <div class="team-panel">
    <div class="team-title" data-i18n="teamBEnemy">チームB（相手）</div>
    <div id="slotsB"></div>
  </div>
</div>

<div class="btn-area">
  <button class="btn btn-primary" onclick="startBattle6v6()">⚔️ <span data-i18n="startBattle">戦闘開始</span></button>
  <button class="btn btn-secondary" onclick="runMonteCarlo6v6()">🎲 <span data-i18n="monteButton">1000回シミュレーション</span></button>
  <button class="btn" style="background:var(--panel2);border:1px solid var(--border);color:var(--text-dim);font-size:0.8rem;padding:8px 14px;" onclick="toggleConfigSummary()">📋 <span data-i18n="showConfig">現在の設定を確認</span></button>
</div>

<div class="player-presets">
  <div class="preset-head">
    <div class="preset-title" data-i18n="playerPresets">プレイヤー保存</div>
    <div class="preset-actions">
      <input id="presetNameInput" type="text" maxlength="40" data-i18n-placeholder="presetNamePlaceholder" placeholder="プレイヤー名">
      <select id="presetSourceSide" aria-label="Preset source team">

let currentLang = 'ja';

function t(key, ...args) {
  const value = I18N[currentLang]?.[key] ?? I18N.ja[key] ?? key;
  return typeof value === 'function' ? value(...args) : value;
}

function entity(key, fallback) {
  return ENTITY_I18N[key]?.[currentLang] ?? ENTITY_I18N[key]?.ja ?? fallback ?? key;
}

function charName(id) {
  return entity(id, CHARS[id]?.name ?? id);
}

function fighterName(fighter) {
  return charName(fighter.data.id);
}

function skillName(skill) {
  return entity('skill_' + skill.effect, skill.name);
}

function optionCharName(id) {
  return charName(id)
    .replace(/\s*\(K\)$/i, '')
    .replace(/\s*\(Opponent\)$/i, '')
    .replace(/\s*\(соперник\)$/i, '')
    .replace(/（K）$/i, '')
    .replace(/【相手】$/, '')
    .replace(/（对手）$/, '')
    .trim();
}

function paramLabel(key, fallback) {
  return entity(key, fallback);
}

function applyI18n() {
  document.documentElement.lang = currentLang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  const select = document.getElementById('languageSelect');
  if (select) select.value = currentLang;
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
}

function refreshLanguage() {
  applyI18n();
  rebuildTeamBuilder();
  updateAllSlotAgis();
  document.getElementById('logArea').innerHTML = `<div class="placeholder">${t('placeholder')}</div>`;
  document.getElementById('monteResult').style.display = 'none';
  renderPlayerPresetList();
  if (document.getElementById('configSummary').style.display === 'flex') {
    document.getElementById('configSummary').style.display = 'none';
    toggleConfigSummary();
  }
}

function setLanguage(lang) {
  currentLang = I18N[lang] ? lang : 'ja';
  try { localStorage.setItem('battleSim_LANG', currentLang); } catch(e) {}
  refreshLanguage();
}

function getParam(charId, effect, key, fallback) {
  const k = `${charId}.${effect}.${key}`;
  return OVERRIDES[k] !== undefined ? OVERRIDES[k] : fallback;
}
function setParam(charId, effect, key, val) {
  OVERRIDES[`${charId}.${effect}.${key}`] = val;
  saveToStorage();
}
function saveToStorage() {
  try {
    localStorage.setItem('battleSim_OVERRIDES', JSON.stringify(OVERRIDES));
    localStorage.setItem('battleSim_SLOT_STAT', JSON.stringify(SLOT_STAT));
    localStorage.setItem('battleSim_TEAM_SEL', JSON.stringify(TEAM_SEL));
    localStorage.setItem('battleSim_LANG', currentLang);
    localStorage.setItem('battleSim_PLAYER_PRESETS', JSON.stringify(PLAYER_PRESETS));
  } catch(e) {}
}
function loadFromStorage() {
  try {
    const lang = localStorage.getItem('battleSim_LANG');
    if (lang && I18N[lang]) currentLang = lang;
    const ov = localStorage.getItem('battleSim_OVERRIDES');
    if (ov) Object.assign(OVERRIDES, JSON.parse(ov));
    const ss = localStorage.getItem('battleSim_SLOT_STAT');
    if (ss) { const d = JSON.parse(ss); Object.assign(SLOT_STAT.A, d.A||{}); Object.assign(SLOT_STAT.B, d.B||{}); }
    const ts = localStorage.getItem('battleSim_TEAM_SEL');
    if (ts) { const d = JSON.parse(ts); Object.assign(TEAM_SEL.A, d.A); Object.assign(TEAM_SEL.B, d.B); }
    const ps = localStorage.getItem('battleSim_PLAYER_PRESETS');
    if (ps) PLAYER_PRESETS.splice(0, PLAYER_PRESETS.length, ...JSON.parse(ps));
  } catch(e) {}
}
function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[ch]));
}

function cloneSlotStats(side) {
  const out = {};
  Object.keys(SLOT_STAT[side] || {}).forEach(idx => {
    out[idx] = Object.assign({}, SLOT_STAT[side][idx]);
  });
  return out;
}

function collectOverrideSnapshot(charIds) {
  const ids = new Set(charIds.filter(Boolean));
  const out = {};
  Object.keys(OVERRIDES).forEach(key => {
    const charId = key.split('.')[0];
    if (ids.has(charId)) out[key] = OVERRIDES[key];
  });
  return out;
}

function presetSummary(preset) {
  return preset.slots
    .filter(Boolean)
    .map(id => optionCharName(id))
    .join(' / ') || t('unselected');
}

function renderPlayerPresetList() {
  const list = document.getElementById('presetList');
  if (!list) return;
  if (!PLAYER_PRESETS.length) {
    list.innerHTML = `<div class="preset-empty">${t('noPresets')}</div>`;
    return;
  }
  list.innerHTML = PLAYER_PRESETS.map(preset => {
    const source = preset.sourceSide === 'B' ? t('teamB') : t('teamA');
    return `<div class="preset-row">
      <div>
        <div class="preset-name">${escapeHtml(preset.name)}</div>
        <div class="preset-meta">${t('savedFrom')}: ${source} / ${escapeHtml(presetSummary(preset))}</div>
      </div>
      <div class="preset-row-actions">
        <button class="preset-mini-btn" onclick="showSinglePreset('${preset.id}')">${t('showPresetData')}</button>
        <button class="preset-mini-btn" onclick="copySinglePreset('${preset.id}')">${t('copyPresetData')}</button>
        <button class="preset-mini-btn" onclick="loadPlayerPreset('${preset.id}','A')">${t('loadToTeamA')}</button>
        <button class="preset-mini-btn" onclick="loadPlayerPreset('${preset.id}','B')">${t('loadToTeamB')}</button>
        <button class="preset-mini-btn danger" onclick="deletePlayerPreset('${preset.id}')">${t('deletePreset')}</button>
      </div>
    </div>`;
  }).join('');
}

function setPresetStatus(message) {
  const el = document.getElementById('presetStatus');
  if (el) el.textContent = message || '';
}

function getPresetExportText(preset) {
  return JSON.stringify(preset || PLAYER_PRESETS, null, 2);
}

function setPresetExportText(value) {
  const box = document.getElementById('presetExportBox');
  if (!box) return null;
  box.value = value;
  box.style.display = 'block';
  box.focus();
  box.select();
  return box;
}

function togglePresetExport() {
  const box = document.getElementById('presetExportBox');
  if (!box) return;
  if (box.style.display === 'block') {
    box.style.display = 'none';
    return;
  }
  setPresetExportText(getPresetExportText());
  setPresetStatus(t('presetExported'));
}

function showSinglePreset(id) {
  const preset = PLAYER_PRESETS.find(p => p.id === id);
  if (!preset) return;
  setPresetExportText(getPresetExportText(preset));
  setPresetStatus(t('presetExported'));
}

function copyPresetText(text) {
  const box = setPresetExportText(text);
  if (!box) return;
  const done = () => setPresetStatus(t('presetCopied'));
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(box.value).then(done).catch(() => {
      try { document.execCommand('copy'); done(); } catch(e) {}
    });
  } else {
    try { document.execCommand('copy'); done(); } catch(e) {}
  }
}

function copySinglePreset(id) {
  const preset = PLAYER_PRESETS.find(p => p.id === id);
  if (!preset) return;
  copyPresetText(getPresetExportText(preset));
}

function copyPresetExport() {
  const box = document.getElementById('presetExportBox');
  if (!box) return;
  copyPresetText(getPresetExportText());
}

function savePlayerPreset() {
  const nameInput = document.getElementById('presetNameInput');
  const sourceSide = document.getElementById('presetSourceSide')?.value === 'B' ? 'B' : 'A';
  const fallbackName = `${sourceSide === 'A' ? t('teamA') : t('teamB')} ${new Date().toLocaleString()}`;
  const name = (nameInput?.value || '').trim() || fallbackName;
  const slots = TEAM_SEL[sourceSide].slice(0, 6);
  const preset = {
    id: `${Date.now().toString(36)}${Math.random().toString(36).slice(2, 7)}`,
    name,
    sourceSide,
    slots,
    slotStats: cloneSlotStats(sourceSide),
    overrides: collectOverrideSnapshot(slots),
    savedAt: Date.now(),
  };
  PLAYER_PRESETS.unshift(preset);
  if (PLAYER_PRESETS.length > 30) PLAYER_PRESETS.length = 30;
  if (nameInput) nameInput.value = '';
  saveToStorage();
  renderPlayerPresetList();
  const box = document.getElementById('presetExportBox');
  if (box && box.style.display === 'block') box.value = getPresetExportText();
  setPresetStatus(t('presetSaved', name));
}

function loadPlayerPreset(id, targetSide) {
  const preset = PLAYER_PRESETS.find(p => p.id === id);
  if (!preset || !SLOT_STAT[targetSide]) return;
  for (let i = 0; i < 6; i++) TEAM_SEL[targetSide][i] = preset.slots[i] || '';
  Object.keys(SLOT_STAT[targetSide]).forEach(key => delete SLOT_STAT[targetSide][key]);
  Object.keys(preset.slotStats || {}).forEach(key => {
    SLOT_STAT[targetSide][key] = Object.assign({}, preset.slotStats[key]);
  });
  Object.assign(OVERRIDES, preset.overrides || {});
  saveToStorage();
  rebuildTeamBuilder();
  renderPlayerPresetList();
  const teamLabel = targetSide === 'A' ? t('teamA') : t('teamB');
  setPresetStatus(t('presetLoaded', preset.name, teamLabel));
  document.getElementById('logArea').innerHTML = `<div class="placeholder">${t('placeholder')}</div>`;
  document.getElementById('monteResult').style.display = 'none';
}

function deletePlayerPreset(id) {
  const idx = PLAYER_PRESETS.findIndex(p => p.id === id);
  if (idx === -1) return;
  const [removed] = PLAYER_PRESETS.splice(idx, 1);
  saveToStorage();
  renderPlayerPresetList();
  const box = document.getElementById('presetExportBox');
  if (box && box.style.display === 'block') box.value = getPresetExportText();
  setPresetStatus(t('presetDeleted', removed.name));
}
function setSlotStat(side, idx, key, val) {
  if (!SLOT_STAT[side][idx]) SLOT_STAT[side][idx] = {};
  if (val === null || val === undefined) {
    delete SLOT_STAT[side][idx][key];
  } else {
    SLOT_STAT[side][idx][key] = val;
  }
  if (key === 'agi') updateSlotAgi(side, idx);
  saveToStorage();
}

function toggleSkillEditor(side) {
  const el = document.getElementById('skillEditor' + side);
  if (el.style.display === 'none') {
    renderSkillEditor(side);
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}

function renderSkillEditor(side) {
  const charId = document.getElementById('select' + side).value;
  const char = CHARS[charId];
  const container = document.getElementById('skillEditor' + side);
  let html = '';

  char.skills.forEach(skill => {
    const info = PARAM_INFO[skill.effect] || {};
    const hasRage = skill.rageCost !== undefined;
    const hasParam = skill.param !== undefined && info.param;
    if (!hasRage && !hasParam) return;

    html += `<div class="skill-edit-row">
      <div class="skill-edit-name">${skillName(skill)}</div>
      <div class="skill-edit-fields">`;

    if (hasRage) {
      const cur = getParam(charId, skill.effect, 'rageCost', skill.rageCost);
      const rageLabel = skill.type === 'defense' ? t('defenseRage') : t('attackRage');
      html += `<div class="skill-edit-field">
        <span>${rageLabel}</span>
        <input type="number" value="${cur}" min="0" max="100"
          onchange="setParam('${charId}','${skill.effect}','rageCost',parseInt(this.value)||0)">
      </div>`;
    }

    if (hasParam) {
      const [label, isPercent] = info.param;
      const raw = getParam(charId, skill.effect, 'param', skill.param);
      const disp = isPercent ? Math.round(raw * 100) : raw;
      const onChange = isPercent
        ? `setParam('${charId}','${skill.effect}','param',parseFloat(this.value)/100)`
        : `setParam('${charId}','${skill.effect}','param',parseFloat(this.value)||0)`;
      html += `<div class="skill-edit-field">
        <span>${paramLabel(label)}:</span>
        <input type="number" value="${disp}" min="0" max="${isPercent?300:999}" step="1"
          onchange="${onChange}">
        ${isPercent ? '%' : ''}
      </div>`;
    }

    html += `</div></div>`;
  });

  container.innerHTML = html || `<p style="color:var(--text-dim)">${t('noAdjustments')}</p>`;
}

// ===== バトルステート =====
class Fighter {
  constructor(data) {
    this.data = data;
    this.name = data.name;
    this.maxHP = data.dur * 4;
    this.hp = (data.hp_start != null && data.hp_start > 0) ? Math.min(data.hp_start, this.maxHP) : this.maxHP;
    this.baseATK = data.atk;
    this.agi = data.agi;
    this.will = data.will;
    this.atkRage = 0;   // 攻撃レイジ（自分が攻撃するたびに溜まる）
    this.defRage = 0;   // 防御レイジ（被弾するたびに溜まる）
    this.maxRage = 100;

    // 状態
    this.firstDodge = false;
    this.damageBonusTurns = 0;
    this.damageBonusPercent = 0;
    this.hardenReady = false;
    this.attackCount = 0;
    this.agiDebuffAttacksLeft = 0;
    this.agiDebuffAmount = 0;
    this.attackRageBonus = 0;
    this.rapidAtkPenalty = 0;
    this.hunterMarkBonus = 0;
    this.lacerateTurns = 0;
    this.lacerateParam = 0;
    this.thornsReady = false;
    this.thornsParam = 0;
    this.tormentBonus = 0; // 折磨による被ダメ増加率（永続）
    this.undyingUsed = false;
    this.suppressNextSkill = false; // 交代後の最初の行動はスキル抑制
    this.suppressRageGain = false;  // 交代後の最初の行動はレイジ増加抑制

    this.applyBattleCry();
  }

  applyBattleCry() {
    const bc = this.data.skills.find(s => s.type === 'battlecry');
    if (!bc) return;
    if (bc.effect === 'heavy_wound') {
      this.firstDodge = true;
      this.damageBonusPercent = getParam(this.data.id, 'heavy_wound', 'param', bc.param);
    }
    if (bc.effect === 'attack_talent') {
      this.attackRageBonus = getParam(this.data.id, 'attack_talent', 'param', bc.param || 3);
    }
    if (bc.effect === 'rapid') {
      const speedUp = getParam(this.data.id, 'rapid', 'param', bc.param || 0.03);
      this.agi = Math.max(1, Math.round(this.agi * (1 + speedUp)));
      this.rapidAtkPenalty = getParam(this.data.id, 'rapid', 'param2', bc.param2 || 0.02);
    }
    // torment は applyTorment() で両者に適用するためここでは処理しない
    // waver は動的に処理
  }

  hasPassive(effect) {
    return this.data.skills.some(s => s.type === 'passive' && s.effect === effect);
  }

  hasBattleCry(effect) {
    return this.data.skills.some(s => s.type === 'battlecry' && s.effect === effect);
  }

  getATK() {
    let mult = 1.0;

    // パッシブ野性: HP10%減るたびに攻撃力UP
    const wildSkill = this.data.skills.find(s => s.type === 'passive' && s.effect === 'wild');
    if (wildSkill) {
      const stacks = Math.floor((1 - this.hp / this.maxHP) * 10);
      mult *= (1 + stacks * getParam(this.data.id, 'wild', 'param', wildSkill.param || 0.05));
    }
    const wildWeakSkill = this.data.skills.find(s => s.type === 'passive' && s.effect === 'wild_weak');
    if (wildWeakSkill) {
      const stacks = Math.floor((1 - this.hp / this.maxHP) * 10);
      mult *= (1 + stacks * getParam(this.data.id, 'wild_weak', 'param', wildWeakSkill.param || 0.03));
    }

    // 戦吼-急速: 速度上昇の代わりに攻撃力DOWN
    if (this.rapidAtkPenalty) mult *= (1 - this.rapidAtkPenalty);

    // 戦吼-動揺
    if (this.hasBattleCry('waver')) {
      const waverBonus   = getParam(this.data.id, 'waver', 'param',  0.15);
      const waverPenalty = getParam(this.data.id, 'waver', 'param2', 0.10);
      if (this.attackCount < 3) mult *= (1 - waverPenalty);
      else if (this.attackCount < 6) mult *= (1 + waverBonus);
    }

    return Math.round(this.baseATK * mult);
  }

  getActiveAttackSkill() {
    return this.data.skills.find(s =>
      s.type === 'attack' && this.atkRage >= getParam(this.data.id, s.effect, 'rageCost', s.rageCost || 0)
    ) || null;
  }

  getActiveDefenseSkill() {
    return this.data.skills.find(s =>
      s.type === 'defense' && this.defRage >= getParam(this.data.id, s.effect, 'rageCost', s.rageCost || 0)
    ) || null;
  }

  hpPct() { return Math.max(0, this.hp / this.maxHP); }
}

// ===== 6v6 シミュレーション =====
function simulateBattle6v6(teamDataA, teamDataB, verbose = true) {
  const validA = teamDataA.filter(Boolean);
  const validB = teamDataB.filter(Boolean);
  if (!validA.length || !validB.length) return null;

  const teamA = validA.map(d => new Fighter(d));
  const teamB = validB.map(d => new Fighter(d));

  const log = [];
  const push = (cls, msg) => { if (verbose) log.push({ cls, msg }); };
  let actionHadCarryover = false;

  const checkUndying = (target) => {
    if (target.hp <= 0 && target.hasPassive('undying') && !target.undyingUsed) {
      target.undyingUsed = true;
      const recoverAmt = getParam(target.data.id, 'undying', 'param', 0.05);
      target.hp = Math.ceil(target.maxHP * recoverAmt);
      push('log-buff', t('undying', fighterName(target), target.hp));
    }
  };

  const doAttack = (atk, def, defTeam, defIdx) => {
    const noRageGain = atk.suppressRageGain;
    atk.suppressRageGain = false;
    actionHadCarryover = false;

    // === 防御スキル（反応型）: 攻撃を受ける側がレイジ消費して発動 ===
    const defReactSkill = def.getActiveDefenseSkill();
    if (defReactSkill) {
      const rc = getParam(def.data.id, defReactSkill.effect, 'rageCost', defReactSkill.rageCost || 0);
      def.defRage -= rc;
      if (defReactSkill.effect === 'harden') {
        def.hardenReady = true;
        def.hardenParam = getParam(def.data.id, 'harden', 'param', defReactSkill.param || 0.20);
        push('log-skill', t('hardenUse', fighterName(def), skillName(defReactSkill), Math.round(def.hardenParam*100)));
      } else if (defReactSkill.effect === 'thorns') {
        def.thornsReady = true;
        def.thornsParam = getParam(def.data.id, 'thorns', 'param', defReactSkill.param || 0.20);
        push('log-skill', t('thornsUse', fighterName(def), skillName(defReactSkill), Math.round(def.thornsParam*100)));
      } else if (defReactSkill.effect === 'purify') {
        let removed = 0;
        if (def.damageBonusTurns > 0) { def.damageBonusTurns = Math.max(0, def.damageBonusTurns - 2); removed++; }
        if (def.agiDebuffAttacksLeft > 0) { def.agiDebuffAttacksLeft = Math.max(0, def.agiDebuffAttacksLeft - 2); removed++; }
        if (def.lacerateTurns > 0) { def.lacerateTurns = Math.max(0, def.lacerateTurns - 2); removed++; }
        const heal = Math.min(removed * 2, 2) * getParam(def.data.id, 'purify', 'param', defReactSkill.param || 5);
        if (heal > 0) def.hp = Math.min(def.maxHP, def.hp + heal);
        push('log-buff', t('purifyUse', fighterName(def), skillName(defReactSkill), Math.min(removed*2,2), heal));
      }
    }

    // スキル抑制: 交代直後 or 敵が回避持ち（firstDodge）の場合は通常攻撃を優先
    const skipByDodge = def.firstDodge;
    const skipSkill = atk.suppressNextSkill || skipByDodge;
    if (atk.suppressNextSkill) atk.suppressNextSkill = false;

    // スキル確認
    const atkSkill = skipSkill ? null : atk.getActiveAttackSkill();
    if (atkSkill) {
      push('log-skill', t('skillUse', fighterName(atk), skillName(atkSkill)));
      atk.atkRage -= getParam(atk.data.id, atkSkill.effect, 'rageCost', atkSkill.rageCost || 0);
    } else if (skipByDodge && atk.getActiveAttackSkill()) {
      push('log-buff', t('dodgeNormal', fighterName(def), fighterName(atk)));
    }

    // ダメージ計算
    const baseATK = atk.getATK() + (atk.hunterMarkBonus || 0);
    const variance = 0.95 + Math.random() * 0.10;
    let dmg = Math.round(baseATK * variance);

    // 大地震撼: メイン攻撃を140%に強化
    if (atkSkill?.effect === 'quake') {
      const quakeRatio = getParam(atk.data.id, 'quake', 'param', atkSkill.param || 1.40);
      dmg = Math.round(baseATK * quakeRatio * variance);
    }

    // 被ダメ補正
    let dmgMult = 1.0;
    if (def.damageBonusTurns > 0) dmgMult += def.damageBonusPercent;
    dmgMult += def.tormentBonus; // 折磨: 被弾側の永続デバフ
    if (def.hardenReady) {
      dmgMult = Math.max(0, dmgMult - (def.hardenParam || 0.20));
      def.hardenReady = false;
      push('log-buff', t('hardenTriggered', fighterName(def)));
    }
    dmg = Math.round(dmg * dmgMult);

    // 初回回避チェック
    if (def.firstDodge) {
      def.firstDodge = false;
      def.damageBonusTurns = 3;
      atk.attackCount++;
      push('log-dodge', t('dodge', fighterName(def), Math.round(def.damageBonusPercent*100)));
      return false;
    }

    // 傷口裂傷: 攻撃前に出血（前ターン適用分のみ）
    if (def.lacerateTurns > 0) {
      const bleedDmg = Math.round(def.maxHP * def.lacerateParam);
      def.hp = Math.max(0, def.hp - bleedDmg);
      def.lacerateTurns--;
      push('log-debuff', t('bleedBefore', fighterName(def), bleedDmg, def.hp));
      checkUndying(def);
      if (def.hp <= 0) return true;
    }

    // ダメージ適用
    def.hp = Math.max(0, def.hp - dmg);
    checkUndying(def);
    const defRageGain = Math.max(0, Math.round(def.will * 0.2778) - (def.hasBattleCry('attack_talent') ? getParam(def.data.id, 'attack_talent', 'param', 3) : 0));
    def.defRage = Math.min(def.maxRage, def.defRage + defRageGain);
    if (def.thornsReady) {
      const reflectDmg = Math.round(dmg * def.thornsParam);
      atk.hp = Math.max(0, atk.hp - reflectDmg);
      def.thornsReady = false;
      push('log-debuff', t('thornsReflect', fighterName(def), fighterName(atk), reflectDmg, atk.hp));
    }
    if (atk.hasPassive('hunter_mark')) {
      const markSkill = atk.data.skills.find(s => s.type === 'passive' && s.effect === 'hunter_mark');
      const markStep = getParam(atk.data.id, 'hunter_mark', 'param', markSkill?.param || 9);
      const markMax = getParam(atk.data.id, 'hunter_mark', 'param2', markSkill?.param2 || markStep * 10);
      atk.hunterMarkBonus = Math.min(markMax, atk.hunterMarkBonus + markStep);
    }
    // 通常攻撃のみレイジ増加（レイジスキル使用時・交代直後は増加しない）
    if (!atkSkill && !noRageGain) {
      const rageGain = Math.round(atk.will * 0.2778) + atk.attackRageBonus;
      atk.atkRage = Math.min(atk.maxRage, atk.atkRage + rageGain);
    }
    atk.attackCount++;
    if (atk.agiDebuffAttacksLeft > 0) {
      atk.agiDebuffAttacksLeft--;
      if (atk.agiDebuffAttacksLeft === 0) {
        atk.agi += atk.agiDebuffAmount;
        atk.agiDebuffAmount = 0;
        push('log-buff', t('speedDebuffEnd', fighterName(atk)));
      }
    }

    // メイン攻撃ログ
    const skillLabel = atkSkill ? `【${skillName(atkSkill)}】` : t('normalAttack');
    const dmgLabel = def.damageBonusTurns > 0 ? t('damageBonus', Math.round(def.damageBonusPercent*100)) : '';
    push('log-attack',
      t('attackLog', fighterName(atk), fighterName(def), skillLabel, dmg, dmgLabel, def.hp));

    // スキル追加効果
    if (atkSkill) {
      if (atkSkill.effect === 'combo') {
        // 連撃: メイン攻撃後に追加打
        // 注意: hardenはメイン攻撃のみに適用されるため、comboMult は harden なしで再計算
        const comboRatio = getParam(atk.data.id, 'combo', 'param', atkSkill.param || 0.60);
        const comboVariance = 0.95 + Math.random() * 0.10;

        // 1撃目で相手が倒れた場合、2撃目は次の敵へキャリーオーバー（回避・不屈無効）
        let comboTarget = def;
        let comboCarryOver = false;
        if (def.hp <= 0 && defTeam && defIdx + 1 < defTeam.length && defTeam[defIdx + 1].hp > 0) {
          comboTarget = defTeam[defIdx + 1];
          comboCarryOver = true;
          actionHadCarryover = true;
        }

        // キャリーオーバー時も回避・不屈の魂は通常通り適用
        if (comboCarryOver && comboTarget.firstDodge) {
          comboTarget.firstDodge = false;
          comboTarget.damageBonusTurns = 3;
          push('log-dodge', t('comboDodge', fighterName(comboTarget), Math.round(comboTarget.damageBonusPercent*100)));
        } else {
          let comboMult = 1.0;
          if (comboTarget.damageBonusTurns > 0) comboMult += comboTarget.damageBonusPercent;
          comboMult += comboTarget.tormentBonus;
          const comboDmg = Math.round(baseATK * comboRatio * comboVariance * comboMult);
          comboTarget.hp = Math.max(0, comboTarget.hp - comboDmg);
          checkUndying(comboTarget);
          // 連撃の追加打は通常攻撃扱い: 速度・レイジに影響しない
          atk.attackCount++;
          if (atk.hasPassive('hunter_mark')) {
            const markSkill = atk.data.skills.find(s => s.type === 'passive' && s.effect === 'hunter_mark');
            const markStep = getParam(atk.data.id, 'hunter_mark', 'param', markSkill?.param || 9);
            const markMax = getParam(atk.data.id, 'hunter_mark', 'param2', markSkill?.param2 || markStep * 10);
            atk.hunterMarkBonus = Math.min(markMax, atk.hunterMarkBonus + markStep);
          }
          const carryLog = comboCarryOver ? t('carryOver', fighterName(comboTarget)) : '';
          push('log-skill', t('comboHit', comboDmg, carryLog, fighterName(comboTarget), comboTarget.hp));
        }
      } else if (atkSkill.effect === 'slow') {
        const slowRate = getParam(atk.data.id, 'slow', 'param', atkSkill.param || 0.12);
        const agiDown = Math.round(def.agi * slowRate);
        def.agi = Math.max(1, def.agi - agiDown);
        def.agiDebuffAttacksLeft = 2;
        def.agiDebuffAmount += agiDown;
        push('log-debuff', t('slowEffect', fighterName(def), agiDown, def.agi));
      } else if (atkSkill.effect === 'breakthrough') {
        const btAmt = getParam(atk.data.id, 'breakthrough', 'param', atkSkill.param || 13);
        const atkDown = Math.min(btAmt, def.atkRage);
        const defDown = Math.min(btAmt, def.defRage);
        def.atkRage = Math.max(0, def.atkRage - btAmt);
        def.defRage = Math.max(0, def.defRage - btAmt);
        push('log-debuff', t('breakthroughEffect', fighterName(def), atkDown, defDown));
      } else if (atkSkill.effect === 'quake') {
        push('log-skill', t('quakeEffect', Math.round(getParam(atk.data.id,'quake','param',atkSkill.param||1.40)*100)));
        const benchRatio = getParam(atk.data.id, 'quake', 'param2', atkSkill.param2 || 0);
        if (benchRatio > 0 && defTeam) {
          for (let i = defIdx + 1; i < defTeam.length; i++) {
            const benched = defTeam[i];
            if (benched.hp > 0) {
              const benchDmg = Math.round(baseATK * benchRatio * variance);
              benched.hp = Math.max(0, benched.hp - benchDmg);
              checkUndying(benched);
              push('log-debuff', t('benchDamage', fighterName(benched), benchDmg, benched.hp));
            }
          }
        }
      } else if (atkSkill.effect === 'lacerate') {
        def.lacerateTurns = 3;
        def.lacerateParam = getParam(atk.data.id, 'lacerate', 'param', atkSkill.param || 0.045);
        push('log-debuff', t('lacerateEffect', fighterName(def), Math.round(def.lacerateParam*100)));
      } else if (atkSkill.effect === 'drain') {
        const healAmt = Math.round(dmg * getParam(atk.data.id, 'drain', 'param', atkSkill.param || 0.40));
        atk.hp = Math.min(atk.maxHP, atk.hp + healAmt);
        push('log-buff', t('drainEffect', fighterName(atk), healAmt, atk.hp));
      }
    }

    return def.hp <= 0;
  };

  // 折磨を現在の対戦両者に適用（参戦時も再利用）
  const applyTorment = (a, b) => {
    [a, b].forEach(f => {
      const bc = f.data.skills.find(s => s.type === 'battlecry' && s.effect === 'torment');
      if (bc) {
        const p = getParam(f.data.id, 'torment', 'param', bc.param || 0.25);
        a.tormentBonus += p;
        b.tormentBonus += p;
        push('log-debuff', t('tormentStart', fighterName(f), Math.round(p*100)));
      }
    });
  };
  applyTorment(teamA[0], teamB[0]);

  let idxA = 0, idxB = 0;
  let chargeA = 0, chargeB = 0;
  const CHARGE_MAX = 1000;
  const MAX_ACTIONS = 2000;
  let winningTeam = null;

  const snapshots = [];
  const snap = () => snapshots.push({
    idxA, idxB,
    hpA: teamA[idxA]?.hp ?? 0, maxHpA: teamA[idxA]?.maxHP ?? 1,
    atkRageA: teamA[idxA]?.atkRage ?? 0, defRageA: teamA[idxA]?.defRage ?? 0,
    hpB: teamB[idxB]?.hp ?? 0, maxHpB: teamB[idxB]?.maxHP ?? 1,
    atkRageB: teamB[idxB]?.atkRage ?? 0, defRageB: teamB[idxB]?.defRage ?? 0,
    teamAHp: teamA.map(f => f.hp),
    teamBHp: teamB.map(f => f.hp),
  });

  // バトル開始ログ
  push('log-start', t('battleStart'));
  push('log-start', t('teamList', t('teamA'), teamA.map(f => fighterName(f)).join(' / ')));
  push('log-start', t('teamList', t('teamB'), teamB.map(f => fighterName(f)).join(' / ')));
  let kongMatchupHp = null; // k_kong_100がkongと対戦開始時のHP
  const logNewMatchup = () => {
    const a = teamA[idxA], b = teamB[idxB];
    if ((a.data.id === 'kong' && b.data.id === 'k_kong_100') ||
        (a.data.id === 'k_kong_100' && b.data.id === 'kong')) {
      kongMatchupHp = b.data.id === 'k_kong_100' ? b.hp : a.hp;
    }
    push('log-start', t('matchup', fighterName(a), fighterName(b)));
    if (a.firstDodge) push('log-buff', t('heavyWoundStart', fighterName(a)));
    if (b.firstDodge) push('log-buff', t('heavyWoundStart', fighterName(b)));
    if (a.hasBattleCry('attack_talent')) push('log-buff', t('attackTalentStart', fighterName(a)));
    if (b.hasBattleCry('attack_talent')) push('log-buff', t('attackTalentStart', fighterName(b)));
    if (a.hasBattleCry('rapid')) {
      const s = a.data.skills.find(skill => skill.effect === 'rapid');
      push('log-buff', t('rapidStart', fighterName(a), Math.round(getParam(a.data.id, 'rapid', 'param', s?.param || 0.03) * 100), Math.round(getParam(a.data.id, 'rapid', 'param2', s?.param2 || 0.02) * 100)));
    }
    if (b.hasBattleCry('rapid')) {
      const s = b.data.skills.find(skill => skill.effect === 'rapid');
      push('log-buff', t('rapidStart', fighterName(b), Math.round(getParam(b.data.id, 'rapid', 'param', s?.param || 0.03) * 100), Math.round(getParam(b.data.id, 'rapid', 'param2', s?.param2 || 0.02) * 100)));
    }
    if (a.hasBattleCry('waver')) push('log-buff', t('waverStart', fighterName(a)));
    if (b.hasBattleCry('waver')) push('log-buff', t('waverStart', fighterName(b)));
  };
  logNewMatchup();
  snap();

  for (let action = 0; action < MAX_ACTIONS; action++) {
    const a = teamA[idxA];
    const b = teamB[idxB];

    const timeToA = (CHARGE_MAX - chargeA) / a.agi;
    const timeToB = (CHARGE_MAX - chargeB) / b.agi;

    let actor, defender, isActorA, timeAdv;
    if (timeToA <= timeToB) {
      timeAdv = timeToA; actor = a; defender = b; isActorA = true;
    } else {
      timeAdv = timeToB; actor = b; defender = a; isActorA = false;
    }
    chargeA += timeAdv * a.agi;
    chargeB += timeAdv * b.agi;
    if (isActorA) chargeA = 0; else chargeB = 0;

    push('log-turn', t('action', fighterName(actor)));
    const defTeam = isActorA ? teamB : teamA;
    const defIdx  = isActorA ? idxB  : idxA;
    const killed = doAttack(actor, defender, defTeam, defIdx);
    snap();

    if (killed || defender.hp <= 0) {
      push('log-winner', t('defeated', fighterName(defender)));

      if (isActorA) {
        idxB++;
        if (idxB >= teamB.length) { winningTeam = 'A'; break; }
        push('log-buff', t('joins', t('teamB'), fighterName(teamB[idxB]), teamB[idxB].maxHP));
        applyTorment(teamA[idxA], teamB[idxB]);
      } else {
        idxA++;
        if (idxA >= teamA.length) { winningTeam = 'B'; break; }
        push('log-buff', t('joins', t('teamA'), fighterName(teamA[idxA]), teamA[idxA].maxHP));
        applyTorment(teamA[idxA], teamB[idxB]);
      }

      // 交代処理: CTBリセット＋キャリーオーバーなし時は最初行動のレイジ増加なし
      chargeA = 0; chargeB = 0;
      if (!actionHadCarryover) actor.suppressRageGain = true;
      logNewMatchup();
      snap();
      continue;
    }

    if (a.damageBonusTurns > 0) a.damageBonusTurns--;
    if (b.damageBonusTurns > 0) b.damageBonusTurns--;
  }

  if (!winningTeam) {
    const hpA = teamA.slice(idxA).reduce((s, f) => s + Math.max(0, f.hp), 0);
    const hpB = teamB.slice(idxB).reduce((s, f) => s + Math.max(0, f.hp), 0);
    winningTeam = hpA >= hpB ? 'A' : 'B';
    push('log-winner', t('timeUp', winningTeam === 'A' ? t('teamA') : t('teamB')));
  } else {
    const aliveA = teamA.filter(f => f.hp > 0).length;
    const aliveB = teamB.filter(f => f.hp > 0).length;
    push('log-winner', t('teamWin', winningTeam === 'A' ? t('teamA') : t('teamB'), aliveA, aliveB));
  }

  return { winningTeam, teamA, teamB, idxA, idxB, log, snapshots, kongMatchupHp };
}

// ===== チームビルダー =====
// デフォルト構成
const TEAM_SEL = {
  A: ['kong', 'dark_rex', 'young_rex', '', '', ''],
  B: ['k_kong', 'k_tyrex', 'gigant', '', '', '']
};

function buildCharOptions() {
  const ids = [
    'kong','dark_rex','young_rex',
    'kibarra_rex_50','kibarra_rex','mini_rex','velociraptor','white_saber','tyrannorex','mineral_rex','golden_rex','ice_ptera',
    'k_kong','k_kong_100','k_tyrex','gigant'
  ];
  const seen = new Set();
  const options = ids
    .filter(id => {
      const name = CHARS[id].name
        .replace(/\s*\(K\)$/i, '')
        .replace(/【相手】$/, '')
        .trim();
      if (seen.has(name)) return false;
      seen.add(name);
      return true;
    })
    .map(id => `<option value="${id}">${optionCharName(id)}</option>`)
    .join('');
  return `<option value="">${t('none')}</option>` + options;
}

function initTeamBuilder() {
  ['A','B'].forEach(side => {
    const container = document.getElementById('slots' + side);
    const opts = buildCharOptions();
    for (let i = 0; i < 6; i++) {
      const defVal = TEAM_SEL[side][i] || '';
      const wrap = document.createElement('div');
      wrap.className = 'team-slot-wrap';
      wrap.innerHTML = `
        <div class="team-slot">
          <span class="slot-num">${i+1}</span>
          <select id="sel${side}${i}" onchange="onSlotChange('${side}',${i})">${opts}</select>
          <span class="slot-agi" id="agi${side}${i}"></span>
          <button class="slot-edit-btn" onclick="toggleSlotEditor('${side}',${i})" title="${t('skillAdjust')}">⚙️</button>
        </div>
        <div class="slot-editor" id="edi${side}${i}" style="display:none"></div>
      `;
      container.appendChild(wrap);
      if (defVal) {
        document.getElementById('sel' + side + i).value = defVal;
      }
      updateSlotAgi(side, i);
    }
  });
}

function rebuildTeamBuilder() {
  ['A','B'].forEach(side => {
    const container = document.getElementById('slots' + side);
    if (container) container.innerHTML = '';
  });
  initTeamBuilder();
}

function onSlotChange(side, idx) {
  const prevId = TEAM_SEL[side][idx];
  const newId = document.getElementById('sel' + side + idx).value;
  TEAM_SEL[side][idx] = newId;
  // キャラ変更時のみリセット（同じキャラ再選択は保持）
  if (prevId !== newId) {
    SLOT_STAT[side][idx] = {};
  }
  saveToStorage();
  updateSlotAgi(side, idx);
  const edEl = document.getElementById('edi' + side + idx);
  // キャラ選択時は⚙️を自動オープン
  if (newId) {
    renderSlotEditor(side, idx);
    edEl.style.display = 'block';
  } else {
    edEl.style.display = 'none';
  }
}

function updateSlotAgi(side, idx) {
  const charId = TEAM_SEL[side][idx];
  const el = document.getElementById('agi' + side + idx);
  if (!charId) { el.textContent = ''; return; }
  const ov = SLOT_STAT[side][idx];
  const agi = ov?.agi ?? CHARS[charId].agi;
  el.textContent = `AGI:${agi}`;
}

function updateAllSlotAgis() {
  ['A','B'].forEach(side => {
    for (let i = 0; i < 6; i++) updateSlotAgi(side, i);
  });
}

function toggleSlotEditor(side, idx) {
  const el = document.getElementById('edi' + side + idx);
  if (el.style.display === 'none') { renderSlotEditor(side, idx); el.style.display = 'block'; }
  else el.style.display = 'none';
}

function renderSlotEditor(side, idx) {
  const charId = TEAM_SEL[side][idx];
  const el = document.getElementById('edi' + side + idx);
  if (!charId) { el.innerHTML = `<p style="color:var(--text-dim);font-size:0.72rem">${t('chooseCharacter')}</p>`; return; }
  const char = CHARS[charId];
  const ov = SLOT_STAT[side][idx] || {};
  const sv = (k) => ov[k] ?? char[k];
  const si = (k) => `setSlotStat('${side}',${idx},'${k}',parseInt(this.value)||0)`;
  const hpStartVal = ov.hp_start ?? '';
  let html = `<div class="skill-edit-row"><div class="skill-edit-name">${t('baseStats')}</div><div class="skill-edit-fields">
    <div class="skill-edit-field"><span>Lv:</span><input type="number" value="${sv('lv')}" min="1" max="200" oninput="${si('lv')}"></div>
    <div class="skill-edit-field"><span>DUR:</span><input type="number" value="${sv('dur')}" min="1" max="9999" oninput="${si('dur')}"></div>
    <div class="skill-edit-field"><span>ATK:</span><input type="number" value="${sv('atk')}" min="1" max="9999" oninput="${si('atk')}"></div>
    <div class="skill-edit-field"><span>AGI:</span><input type="number" value="${sv('agi')}" min="1" max="9999" oninput="${si('agi')}"></div>
    <div class="skill-edit-field"><span>WIL:</span><input type="number" value="${sv('will')}" min="1" max="9999" oninput="${si('will')}"></div>
  </div></div>
  <div class="skill-edit-row"><div class="skill-edit-name" style="color:var(--text-dim);font-size:0.7rem">${t('startHp')}</div><div class="skill-edit-fields">
    <div class="skill-edit-field"><span>HP:</span><input type="number" value="${hpStartVal}" min="1" max="99999" placeholder="${t('fullHp')}"
      oninput="setSlotStat('${side}',${idx},'hp_start',parseInt(this.value)||null)"
      onchange="if(!this.value){setSlotStat('${side}',${idx},'hp_start',null)}"></div>
    <span style="color:var(--text-dim);font-size:0.68rem">${t('example')}: 586</span>
  </div></div>`;
  char.skills.forEach(skill => {
    const info = PARAM_INFO[skill.effect] || {};
    const hasRage = skill.rageCost !== undefined;
    const hasParam = info.param !== undefined;  // PARAM_INFOに登録があれば表示
    const knownEffect = Object.keys(PARAM_INFO).includes(skill.effect);
    if (!hasRage && !hasParam && !knownEffect) return;
    html += `<div class="skill-edit-row"><div class="skill-edit-name">${skillName(skill)}</div><div class="skill-edit-fields">`;
    if (!hasRage && !hasParam) {
      html += `<span style="color:var(--text-dim);font-size:0.72rem">${t('unavailable')}</span>`;
    }
    if (hasRage) {
      const cur = getParam(charId, skill.effect, 'rageCost', skill.rageCost);
      const lbl = skill.type === 'defense' ? t('defenseRage') : t('attackRage');
      html += `<div class="skill-edit-field"><span>${lbl}</span><input type="number" value="${cur}" min="0" max="100" oninput="setParam('${charId}','${skill.effect}','rageCost',parseInt(this.value)||0)"></div>`;
    }
    if (hasParam) {
      const [label, isPercent, defaultVal] = info.param;
      const raw = getParam(charId, skill.effect, 'param', skill.param ?? defaultVal);
      const disp = isPercent ? Math.round(raw * 100) : raw;
      const onChange = isPercent ? `setParam('${charId}','${skill.effect}','param',parseFloat(this.value)/100)` : `setParam('${charId}','${skill.effect}','param',parseFloat(this.value)||0)`;
      html += `<div class="skill-edit-field"><span>${paramLabel(label)}:</span><input type="number" value="${disp}" min="0" max="${isPercent?300:999}" step="1" oninput="${onChange}">${isPercent?'%':''}</div>`;
    }
    if (info.param2) {
      const [label2, isPercent2, defaultVal2] = info.param2;
      const raw2 = getParam(charId, skill.effect, 'param2', defaultVal2);
      const disp2 = isPercent2 ? Math.round(raw2 * 100) : raw2;
      const onChange2 = isPercent2 ? `setParam('${charId}','${skill.effect}','param2',parseFloat(this.value)/100)` : `setParam('${charId}','${skill.effect}','param2',parseFloat(this.value)||0)`;
      html += `<div class="skill-edit-field"><span>${paramLabel(label2)}:</span><input type="number" value="${disp2}" min="0" max="${isPercent2?300:999}" step="1" oninput="${onChange2}">${isPercent2?'%':''}</div>`;
    }
    html += `</div></div>`;
  });
  el.innerHTML = html || `<p style="color:var(--text-dim);font-size:0.72rem">${t('noAdjustments')}</p>`;
}

function getTeamData(side) {
  return TEAM_SEL[side].map((id, idx) => {
    if (!id) return null;
    const base = CHARS[id];
    const ov = SLOT_STAT[side][idx] || {};
    return Object.assign({}, base, {
      dur:      ov.dur      ?? base.dur,
      atk:      ov.atk      ?? base.atk,
      agi:      ov.agi      ?? base.agi,
      will:     ov.will     ?? base.will,
      lv:       ov.lv       ?? base.lv,
      hp_start: ov.hp_start ?? null,
    });
  }).filter(Boolean);
}

// ===== UI 関数 =====
function stars(n) { return '★'.repeat(n) + '☆'.repeat(5-n); }

function setBar(id, pct) {
  const bar = document.getElementById(id);
  bar.style.width = (pct * 100) + '%';
  bar.className = 'bar-inner hp-bar' + (pct < 0.3 ? ' low' : pct < 0.6 ? ' mid' : '');
}

function updateCurrentFighters(result) {
  const { teamA, teamB, idxA, idxB, winningTeam } = result;
  const fa = teamA[idxA] || teamA[teamA.length - 1];
  const fb = teamB[idxB] || teamB[teamB.length - 1];
  document.getElementById('fighters').style.display = 'flex';
  document.getElementById('nameA').textContent = fighterName(fa);
  document.getElementById('lvA').textContent = `Lv${fa.data.lv} ${stars(fa.data.stars)}`;
  document.getElementById('nameB').textContent = fighterName(fb);
  document.getElementById('lvB').textContent = `Lv${fb.data.lv} ${stars(fb.data.stars)}`;
  setBar('hpBarA', fa.hpPct());
  setBar('hpBarB', fb.hpPct());
  document.getElementById('hpTextA').textContent = `${Math.max(0,fa.hp)}/${fa.maxHP}`;
  document.getElementById('hpTextB').textContent = `${Math.max(0,fb.hp)}/${fb.maxHP}`;
  document.getElementById('rageTextA').textContent = `${t('attackShort')}${fa.atkRage} ${t('defenseShort')}${fa.defRage}`;
  document.getElementById('rageTextB').textContent = `${t('attackShort')}${fb.atkRage} ${t('defenseShort')}${fb.defRage}`;
  document.getElementById('rageBarA').style.width = Math.max(fa.atkRage, fa.defRage) + '%';
  document.getElementById('rageBarB').style.width = Math.max(fb.atkRage, fb.defRage) + '%';
  document.getElementById('cardA').className = 'fighter-card' + (winningTeam === 'A' ? ' winner' : winningTeam === 'B' ? ' loser' : '');
  document.getElementById('cardB').className = 'fighter-card' + (winningTeam === 'B' ? ' winner' : winningTeam === 'A' ? ' loser' : '');
}

function updateRoster(result) {
  const { teamA, teamB, idxA, idxB } = result;
  document.getElementById('teamRosters').style.display = 'flex';
  ['A','B'].forEach(side => {
    const team = side === 'A' ? teamA : teamB;
    const curIdx = side === 'A' ? idxA : idxB;
    const el = document.getElementById('roster' + side);
    el.innerHTML = team.map((f, i) => {
      const cls = i < curIdx ? 'dead' : i === curIdx ? 'current' : 'alive';
      const displayName = fighterName(f);
      const shortName = displayName.replace('(K)','K').replace('レックス','REX').replace('コング','Kong').replace('ホワイトサーベル','WSB').replace('ギガント王竜','Giant').replace('ヤング','Y').replace('暗黒','Dark').replace('怪力','').replace('暴王','').replace('黄棘','').replace('ミニ','Mini').slice(0, 8);
      return `<div class="roster-icon ${cls}" title="${displayName} HP:${Math.max(0,f.hp)}/${f.maxHP}">${shortName}</div>`;
    }).join('');
  });
}

function startBattle6v6() {
  const tdA = getTeamData('A');
  const tdB = getTeamData('B');
  if (!tdA.length || !tdB.length) { alert(t('needTeams')); return; }
  const result = simulateBattle6v6(tdA, tdB, true);
  if (!result) return;

  updateCurrentFighters(result);
  updateRoster(result);

  const logArea = document.getElementById('logArea');
  logArea.innerHTML = result.log.map(l => `<div class="${l.cls}">${l.msg}</div>`).join('');
  logArea.scrollTop = logArea.scrollHeight;

  document.getElementById('monteResult').style.display = 'none';
}

function runMonteCarlo6v6() {
  const tdA = getTeamData('A');
  const tdB = getTeamData('B');
  if (!tdA.length || !tdB.length) { alert(t('needTeams')); return; }
  let winsA = 0, winsB = 0;
  const hpStatsA = [], hpStatsB = [];
  const survStatsA = [], survStatsB = [];
  const kongHpWhenFacingLv61 = []; // Lv100がLv61と対戦開始時のHP記録
  const kongLv61FinalHp = []; // チームA勝利時のLv61最終HP
  const N = 1000;
  for (let i = 0; i < N; i++) {
    const res = simulateBattle6v6(tdA, tdB, false);
    if (res && res.kongMatchupHp != null) kongHpWhenFacingLv61.push(res.kongMatchupHp);
    if (!res) break;
    if (res.winningTeam === 'A') {
      winsA++;
      const alive = res.teamA.filter(f => f.hp > 0);
      hpStatsA.push(alive.reduce((s, f) => s + f.hp, 0));
      survStatsA.push(alive.length);
      const lv61 = res.teamA.find(f => f.data.id === 'kong');
      if (lv61 && lv61.hp > 0) kongLv61FinalHp.push(lv61.hp);
    } else {
      winsB++;
      const alive = res.teamB.filter(f => f.hp > 0);
      hpStatsB.push(alive.reduce((s, f) => s + f.hp, 0));
      survStatsB.push(alive.length);
    }
  }

  const stat = arr => arr.length ? {
    min: Math.min(...arr),
    avg: Math.round(arr.reduce((s,v)=>s+v,0)/arr.length),
    max: Math.max(...arr)
  } : null;
  const stA = stat(hpStatsA), stB = stat(hpStatsB);
  const avgSurvA = survStatsA.length ? (survStatsA.reduce((s,v)=>s+v,0)/survStatsA.length).toFixed(1) : '-';
  const avgSurvB = survStatsB.length ? (survStatsB.reduce((s,v)=>s+v,0)/survStatsB.length).toFixed(1) : '-';

  const pctA = (winsA / N * 100).toFixed(0);
  const pctB = (winsB / N * 100).toFixed(0);
  const nameA = tdA.map(c => charName(c.id)).join('/');
  const nameB = tdB.map(c => charName(c.id)).join('/');

  document.getElementById('monteBarA').style.width = pctA + '%';
  document.getElementById('monteBarA').textContent = pctA + '%';
  document.getElementById('monteBarB').style.width = pctB + '%';
  document.getElementById('monteBarB').textContent = pctB + '%';
  document.getElementById('monteNameA').textContent = t('teamA');
  document.getElementById('monteNameB').textContent = t('teamB');

  const hpRowA = stA ? `<div style="margin-top:6px;padding:6px 8px;background:rgba(41,128,185,0.1);border-radius:6px;border-left:2px solid #2980b9">
    ${t('hpRow', t('teamA'), stA.min, stA.avg, stA.max, avgSurvA)}
  </div>` : '';
  const hpRowB = stB ? `<div style="margin-top:4px;padding:6px 8px;background:rgba(192,57,43,0.1);border-radius:6px;border-left:2px solid #c0392b">
    ${t('hpRow', t('teamB'), stB.min, stB.avg, stB.max, avgSurvB)}
  </div>` : '';

  const kongHpStat = kongHpWhenFacingLv61.length ? (() => {
    const sorted = [...kongHpWhenFacingLv61].sort((a,b)=>a-b);
    return t('statLine', sorted[0], Math.round(sorted.reduce((s,v)=>s+v,0)/sorted.length), sorted[sorted.length-1], t('casesUnder', sorted.filter(v=>v<=700).length, 700));
  })() : t('noKong');

  const lv61FinalStat = kongLv61FinalHp.length ? (() => {
    const sorted = [...kongLv61FinalHp].sort((a,b)=>a-b);
    const under1200 = sorted.filter(v=>v<=1200).length;
    return t('statLine', sorted[0], Math.round(sorted.reduce((s,v)=>s+v,0)/sorted.length), sorted[sorted.length-1], t('casesUnderTotal', under1200, 1200, kongLv61FinalHp.length));
  })() : t('noLv61');

  document.getElementById('monteStats').innerHTML =
    `<div>${t('winRate', t('teamA'), pctA, nameA)}</div>
     <div>${t('winRate', t('teamB'), pctB, nameB)}</div>
     <div style="margin-top:4px">${t('judgement', winsA >= winsB ? t('teamA') : t('teamB'), Math.max(winsA,winsB), N)}</div>
     ${hpRowA}${hpRowB}
     <div style="margin-top:4px;padding:6px 8px;background:rgba(255,165,0,0.1);border-radius:6px;border-left:2px solid orange;font-size:0.85em">
       ${t('lv100Hp')} ${kongHpStat}
     </div>
     <div style="margin-top:4px;padding:6px 8px;background:rgba(100,200,100,0.1);border-radius:6px;border-left:2px solid #27ae60;font-size:0.85em">
       ${t('lv61FinalHp')} ${lv61FinalStat}
     </div>`;

  document.getElementById('monteResult').style.display = 'block';
}

function toggleConfigSummary() {
  const panel = document.getElementById('configSummary');
  if (panel.style.display === 'flex') { panel.style.display = 'none'; return; }
  ['A','B'].forEach(side => {
    const team = getTeamData(side);
    const el = document.getElementById('configTeam' + side);
    const label = side === 'A' ? t('teamAOwn') : t('teamBEnemy');
    if (!team.length) {
      el.innerHTML = `<div class="config-team-title">${label}</div><div class="config-empty">${t('unselected')}</div>`;
      return;
    }
    let html = `<div class="config-team-title">${label}</div>`;
    team.forEach(c => {
      const hp = c.dur * 4;
      const rageGain = Math.round(c.will * 0.2778);
      let skillRows = '';
      c.skills.forEach(s => {
        const info = PARAM_INFO[s.effect] || {};
        let detail = '';
        if (s.rageCost !== undefined) {
          const rc = getParam(c.id, s.effect, 'rageCost', s.rageCost);
          detail += `${t('cost')}<b>${rc}</b> `;
        }
        if (info.param) {
          const [lbl, isPct] = info.param;
          const val = getParam(c.id, s.effect, 'param', s.param ?? info.param[2]);
          detail += `${paramLabel(lbl)}:<b>${isPct ? Math.round(val*100)+'%' : val}</b> `;
        }
        if (info.param2) {
          const [lbl2, isPct2] = info.param2;
          const val2 = getParam(c.id, s.effect, 'param2', s.param2 ?? info.param2[2]);
          if (val2) detail += `${paramLabel(lbl2)}:<b>${isPct2 ? Math.round(val2*100)+'%' : val2}</b>`;
        }
        skillRows += `<div class="config-skill-row">${skillName(s)}${detail ? ' - ' + detail : ''}</div>`;
      });
      html += `<div class="config-char-row">
        <div class="config-char-name">Lv${c.lv} ${charName(c.id)} ${stars(c.stars)}</div>
        <div class="config-char-stats">HP:<span>${hp}</span> ATK:<span>${c.atk}</span> AGI:<span>${c.agi}</span> WIL:<span>${c.will}</span> -> ${t('rageGainShort')}<span>${rageGain}</span>${t('perAction')}</div>
        ${skillRows}
      </div>`;
    });
    el.innerHTML = html;
  });
  panel.style.display = 'flex';
}

loadFromStorage();
applyI18n();
initTeamBuilder();
renderPlayerPresetList();
