<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>URL Changed</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #101214;
      color: #f3e6c8;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(560px, calc(100vw - 40px));
      padding: 28px;
      border: 1px solid rgba(212, 167, 91, .35);
      background: rgba(0, 0, 0, .28);
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 12px; font-size: 24px; }
    p { margin: 8px 0; color: #c9bda7; line-height: 1.7; }
  </style>
</head>
<body>
  <main>
    <h1>URLが変更されました</h1>
    <p>このURLではバトルシミュレーターを使用できません。</p>
    <p>新しいURLから開いてください。</p>
  </main>
</body>
</html>
